<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Docker Website is here</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:#f4f4f4;
            font-family:Arial, Helvetica, sans-serif;
        }

        .container{
            width:600px;
            margin:100px auto;
            text-align:center;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h1{
            color:#0077cc;
        }

        p{
            font-size:18px;
        }

        button{
            background:#0077cc;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#005fa3;
        }
    </style>

</head>

<body>

<div class="container">

<h1>Welcome to My Docker Website</h1>

<p>This website is running inside a Docker container.</p>

<button onclick="showMessage()">Click Here</button>

<p id="demo"></p>

</div>

<script>

function showMessage(){

document.getElementById("demo").innerHTML="Congratulations! Docker is working successfully.";

}

</script>

</body>
</html>
